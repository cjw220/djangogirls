{% extends 'blog/base.html' %}

{% block content %}
    <article class="post">
        <a class="btn btn-danger float-end" href="{% url 'post_remove' pk=post.pk %}" 
           onclick="return confirm('Are you sure you want to delete this?')">
            DELETE POST
        </a>

        <h2>{{ post.title }}</h2>
        <p>{{ post.text|linebreaksbr }}</p>
    </article>
{% endblock %}
